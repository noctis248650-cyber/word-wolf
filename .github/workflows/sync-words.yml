name: Sync Word DB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/word_pairs.csv"
      - "scripts/sync-words.mjs"
      - ".github/workflows/sync-words.yml"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Sync words to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-words.mjs
